<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Tool — Free PDF Combine & Compress</title>
    <meta name="description" content="Free PDF tool to combine multiple PDFs or compress PDF file size. No watermarks, no limits. Runs locally on your machine.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="url(#g)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs>
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
                </svg>
                <h1>PDF Tool</h1>
            </div>
            <p class="subtitle">Combine & compress PDFs — free, fast, private</p>
        </header>

        <nav class="tabs" role="tablist">
            <button class="tab active" data-tab="combine" role="tab" aria-selected="true" id="tab-combine">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
                Combine
            </button>
            <button class="tab" data-tab="compress" role="tab" aria-selected="false" id="tab-compress">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                Compress
            </button>
        </nav>

        <main class="card" id="main-card">
            <!-- ── Combine Panel ── -->
            <section id="combine-panel" class="panel active">
                <div id="combine-drop" class="dropzone">
                    <div class="dropzone-inner">
                        <svg class="dropzone-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <p>Drag & drop PDF files here</p>
                        <span class="hint">or click to browse · up to 50 files</span>
                    </div>
                    <input type="file" id="combine-input" multiple accept=".pdf" hidden>
                </div>
                <div id="combine-list" class="filelist"></div>
                <button id="combine-btn" class="btn primary" disabled>Combine PDFs</button>
            </section>

            <!-- ── Compress Panel ── -->
            <section id="compress-panel" class="panel">
                <div id="compress-drop" class="dropzone">
                    <div class="dropzone-inner">
                        <svg class="dropzone-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <p>Drag & drop a PDF file here</p>
                        <span class="hint">or click to browse · max 200 MB</span>
                    </div>
                    <input type="file" id="compress-input" accept=".pdf" hidden>
                </div>
                <div id="compress-info" class="file-info" hidden>
                    <svg class="file-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    <span id="compress-filename" class="file-name"></span>
                    <span id="compress-filesize" class="file-size"></span>
                    <button id="compress-remove" class="file-btn" title="Remove file">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div id="compress-levels" class="levels" hidden>
                    <label class="level-option">
                        <input type="radio" name="level" value="low">
                        <span class="level-label">Low<small>300 dpi</small></span>
                    </label>
                    <label class="level-option">
                        <input type="radio" name="level" value="medium" checked>
                        <span class="level-label">Medium<small>150 dpi</small></span>
                    </label>
                    <label class="level-option">
                        <input type="radio" name="level" value="high">
                        <span class="level-label">High<small>72 dpi</small></span>
                    </label>
                </div>
                <button id="compress-btn" class="btn primary" disabled>Compress PDF</button>
            </section>

            <!-- ── Status Overlay ── -->
            <div id="overlay" class="overlay" hidden>
                <div class="status-content">
                    <div id="state-progress">
                        <div class="spinner"></div>
                        <p id="status-text" class="status-text">Uploading…</p>
                        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
                    </div>
                    <div id="state-success" hidden>
                        <div class="success-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </div>
                        <p class="status-text success-text">Download Complete!</p>
                        <p id="size-info" class="size-info"></p>
                        <button id="another-btn" class="btn primary">Process Another PDF</button>
                    </div>
                    <div id="state-error" hidden>
                        <div class="error-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                        </div>
                        <p id="error-text" class="error-text"></p>
                        <button id="retry-btn" class="btn secondary">Try Again</button>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>All processing happens on your machine. Files are never uploaded to the cloud.</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
